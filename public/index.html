<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>АКСИОМА — Защита PDF</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  /* Тёмный градиент + диагональные линии (фирменный стиль АКСИОМЫ) */
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Segoe UI', Roboto, sans-serif;
    background:
      radial-gradient(ellipse at top left, rgba(0, 200, 220, 0.08) 0%, transparent 50%),
      radial-gradient(ellipse at bottom right, rgba(0, 150, 180, 0.06) 0%, transparent 50%),
      linear-gradient(135deg, #0a1929 0%, #0d2a3d 50%, #0f3a4a 100%);
    background-attachment: fixed;
    min-height: 100vh;
    color: #e8eef2;
    padding: 40px 20px;
    position: relative;
    overflow-x: hidden;
  }

  /* Диагональные тонкие линии (как на обложке) */
  body::before {
    content: '';
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    background-image:
      linear-gradient(70deg, transparent 49.7%, rgba(120, 200, 220, 0.08) 49.8%, rgba(120, 200, 220, 0.08) 50.1%, transparent 50.3%),
      linear-gradient(70deg, transparent 49.85%, rgba(120, 200, 220, 0.05) 49.9%, rgba(120, 200, 220, 0.05) 50.05%, transparent 50.1%);
    background-size: 100% 100%;
    pointer-events: none;
    z-index: 0;
  }

  body::after {
    content: '';
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    background-image:
      linear-gradient(110deg, transparent 49.9%, rgba(120, 200, 220, 0.06) 50%, transparent 50.1%),
      linear-gradient(110deg, transparent 79.85%, rgba(120, 200, 220, 0.04) 79.9%, transparent 79.95%);
    background-size: 100% 100%;
    pointer-events: none;
    z-index: 0;
  }

  .wrapper {
    max-width: 640px;
    margin: 0 auto;
    position: relative;
    z-index: 1;
  }

  /* Шапка — брендинг АКСИОМА */
  .brand {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 50px;
    padding: 0 10px;
  }
  .brand-logo {
    font-size: 22px;
    font-weight: 300;
    letter-spacing: 4px;
    color: #ffffff;
  }
  .brand-section {
    font-size: 14px;
    font-weight: 300;
    letter-spacing: 3px;
    color: rgba(120, 200, 220, 0.7);
  }

  /* Главный блок */
  .container {
    background: rgba(20, 40, 60, 0.6);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    border: 1px solid rgba(120, 200, 220, 0.15);
    border-radius: 24px;
    padding: 40px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.4);
  }

  .title {
    font-size: 32px;
    font-weight: 300;
    color: #ffffff;
    margin-bottom: 8px;
    letter-spacing: -0.5px;
  }
  .title-accent {
    color: #5fc7d4;
    font-weight: 400;
  }
  .subtitle {
    color: rgba(232, 238, 242, 0.6);
    font-size: 14px;
    font-weight: 300;
    margin-bottom: 32px;
    letter-spacing: 0.3px;
  }

  /* Переключатель режимов — пилюли */
  .mode-selector {
    display: flex;
    gap: 6px;
    margin-bottom: 28px;
    background: rgba(10, 25, 40, 0.5);
    padding: 5px;
    border-radius: 14px;
    border: 1px solid rgba(120, 200, 220, 0.1);
  }
  .mode-btn {
    flex: 1;
    padding: 12px 8px;
    background: transparent;
    border: none;
    border-radius: 10px;
    cursor: pointer;
    text-align: center;
    font-size: 13px;
    font-weight: 400;
    color: rgba(232, 238, 242, 0.5);
    transition: all 0.25s ease;
    letter-spacing: 0.2px;
  }
  .mode-btn:hover {
    color: rgba(232, 238, 242, 0.8);
  }
  .mode-btn.active {
    background: linear-gradient(135deg, rgba(95, 199, 212, 0.2) 0%, rgba(95, 199, 212, 0.1) 100%);
    color: #5fc7d4;
    box-shadow: inset 0 0 0 1px rgba(95, 199, 212, 0.3);
  }
  .mode-btn .mode-icon {
    display: block;
    font-size: 20px;
    margin-bottom: 4px;
  }

  /* Drop zone */
  .drop-zone {
    border: 2px dashed rgba(120, 200, 220, 0.25);
    border-radius: 16px;
    padding: 50px 20px;
    text-align: center;
    cursor: pointer;
    transition: all 0.25s;
    background: rgba(10, 25, 40, 0.3);
    margin-bottom: 24px;
  }
  .drop-zone:hover, .drop-zone.dragover {
    border-color: rgba(95, 199, 212, 0.6);
    background: rgba(95, 199, 212, 0.05);
  }
  .drop-zone.has-file {
    border-style: solid;
    border-color: rgba(95, 199, 212, 0.4);
    background: rgba(95, 199, 212, 0.08);
  }
  .drop-icon {
    font-size: 48px;
    margin-bottom: 14px;
    opacity: 0.7;
  }
  .drop-text {
    font-size: 15px;
    color: rgba(232, 238, 242, 0.8);
    margin-bottom: 4px;
    font-weight: 400;
  }
  .drop-hint {
    font-size: 12px;
    color: rgba(232, 238, 242, 0.4);
    font-weight: 300;
  }
  .file-name {
    font-size: 14px;
    color: #5fc7d4;
    font-weight: 500;
    word-break: break-all;
  }
  .file-size {
    font-size: 12px;
    color: rgba(232, 238, 242, 0.5);
    margin-top: 4px;
  }
  .file-remove {
    display: inline-block;
    margin-top: 8px;
    font-size: 12px;
    color: rgba(232, 238, 242, 0.5);
    text-decoration: underline;
    cursor: pointer;
  }
  .file-remove:hover { color: #ff7a8a; }

  /* Поля */
  .field {
    margin-bottom: 20px;
  }
  .field-label {
    display: block;
    font-size: 12px;
    font-weight: 400;
    color: rgba(232, 238, 242, 0.6);
    margin-bottom: 8px;
    letter-spacing: 0.5px;
    text-transform: uppercase;
  }
  .field-input {
    width: 100%;
    padding: 14px 16px;
    background: rgba(10, 25, 40, 0.5);
    border: 1px solid rgba(120, 200, 220, 0.15);
    border-radius: 10px;
    font-size: 14px;
    color: #ffffff;
    font-family: inherit;
    transition: all 0.2s;
  }
  .field-input:focus {
    outline: none;
    border-color: rgba(95, 199, 212, 0.5);
    background: rgba(10, 25, 40, 0.7);
  }
  .field-input::placeholder {
    color: rgba(232, 238, 242, 0.3);
  }

  /* Кнопка — главная */
  .btn-primary {
    width: 100%;
    padding: 16px;
    background: linear-gradient(135deg, #5fc7d4 0%, #3a9eb0 100%);
    border: none;
    border-radius: 12px;
    color: #0a1929;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.25s;
    letter-spacing: 0.3px;
    text-transform: uppercase;
    margin-top: 8px;
  }
  .btn-primary:hover:not(:disabled) {
    transform: translateY(-1px);
    box-shadow: 0 8px 24px rgba(95, 199, 212, 0.3);
  }
  .btn-primary:disabled {
    opacity: 0.4;
    cursor: not-allowed;
  }

  /* Статус */
  .status {
    margin-top: 20px;
    padding: 16px 18px;
    border-radius: 12px;
    font-size: 14px;
    line-height: 1.6;
    display: none;
  }
  .status.show { display: block; }
  .status.processing {
    background: rgba(95, 199, 212, 0.1);
    border: 1px solid rgba(95, 199, 212, 0.3);
    color: #5fc7d4;
  }
  .status.success {
    background: rgba(95, 199, 212, 0.15);
    border: 1px solid rgba(95, 199, 212, 0.4);
    color: #b8e6ed;
  }
  .status.error {
    background: rgba(255, 122, 138, 0.1);
    border: 1px solid rgba(255, 122, 138, 0.3);
    color: #ff9aa6;
  }
  .status code {
    background: rgba(10, 25, 40, 0.5);
    padding: 2px 8px;
    border-radius: 4px;
    font-size: 13px;
    color: #5fc7d4;
  }
  .spinner {
    display: inline-block;
    width: 14px;
    height: 14px;
    border: 2px solid rgba(95, 199, 212, 0.3);
    border-top-color: #5fc7d4;
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    margin-right: 8px;
    vertical-align: middle;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* Подвал — только лёгкая подпись */
  .footer {
    margin-top: 50px;
    text-align: center;
  }
  .footer-mark {
    display: inline-block;
    width: 32px;
    height: 1px;
    background: linear-gradient(90deg, transparent 0%, rgba(95, 199, 212, 0.5) 50%, transparent 100%);
  }

  /* Hint под полями */
  .field-hint {
    font-size: 11px;
    color: rgba(232, 238, 242, 0.4);
    margin-top: 6px;
    font-weight: 300;
  }
</style>
</head>
<body>
  <div class="wrapper">
    <div class="container">
      <h1 class="title">Защита <span class="title-accent">PDF</span></h1>
      <p class="subtitle">Шифрование паролем и водяной знак для конфиденциальных документов</p>

      <div class="mode-selector">
        <button class="mode-btn active" data-mode="encrypted_pdf">
          <span class="mode-icon">🔒</span>
          Зашифрованный PDF
        </button>
        <button class="mode-btn" data-mode="flat_pdf">
          <span class="mode-icon">🖼</span>
          Плоский PDF
        </button>
        <button class="mode-btn" data-mode="html_viewer">
          <span class="mode-icon">👁</span>
          HTML-просмотр
        </button>
      </div>

      <div class="drop-zone" id="dropZone">
        <div class="drop-icon">📄</div>
        <div class="drop-text">Перетащите PDF сюда</div>
        <div class="drop-hint">или нажмите для выбора · до 50 МБ</div>
        <input type="file" id="fileInput" accept="application/pdf" hidden>
      </div>

      <div class="field" id="passwordField">
        <label class="field-label">Пароль</label>
        <input type="text" class="field-input" id="passwordInput" placeholder="по умолчанию: axioma2026">
        <div class="field-hint">Получатель документа введёт его для просмотра</div>
      </div>

      <div class="field" id="watermarkField">
        <label class="field-label">Водяной знак</label>
        <input type="text" class="field-input" id="watermarkInput" placeholder='по умолчанию: АКСИОМА — Конфиденциально'>
      </div>

      <button class="btn-primary" id="processBtn" disabled>
        Защитить документ
      </button>

      <div class="status" id="status"></div>
    </div>

    <div class="footer">
      <span class="footer-mark"></span>
    </div>
  </div>

<script>
let selectedFile = null;
let currentMode = 'encrypted_pdf';

const dropZone = document.getElementById('dropZone');
const fileInput = document.getElementById('fileInput');
const processBtn = document.getElementById('processBtn');
const statusEl = document.getElementById('status');
const passwordInput = document.getElementById('passwordInput');
const watermarkInput = document.getElementById('watermarkInput');
const passwordField = document.getElementById('passwordField');
const watermarkField = document.getElementById('watermarkField');

document.querySelectorAll('.mode-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    currentMode = btn.dataset.mode;
    // HTML-просмотр не требует пароля и водяного знака
    const hide = currentMode === 'html_viewer';
    passwordField.style.display = hide ? 'none' : 'block';
    watermarkField.style.display = hide ? 'none' : 'block';
  });
});

dropZone.addEventListener('click', () => fileInput.click());
dropZone.addEventListener('dragover', (e) => { e.preventDefault(); dropZone.classList.add('dragover'); });
dropZone.addEventListener('dragleave', () => dropZone.classList.remove('dragover'));
dropZone.addEventListener('drop', (e) => {
  e.preventDefault();
  dropZone.classList.remove('dragover');
  if (e.dataTransfer.files.length) handleFile(e.dataTransfer.files[0]);
});
fileInput.addEventListener('change', (e) => {
  if (e.target.files.length) handleFile(e.target.files[0]);
});

function handleFile(file) {
  if (!file.name.toLowerCase().endsWith('.pdf')) {
    showStatus('error', 'Можно загружать только PDF-файлы');
    return;
  }
  if (file.size > 50 * 1024 * 1024) {
    showStatus('error', 'Файл больше 50 МБ');
    return;
  }
  selectedFile = file;
  dropZone.classList.add('has-file');
  dropZone.innerHTML = `
    <div class="drop-icon">✅</div>
    <div class="file-name">${escapeHtml(file.name)}</div>
    <div class="file-size">${formatSize(file.size)}</div>
    <div class="file-remove">убрать</div>
  `;
  dropZone.querySelector('.file-remove').addEventListener('click', (e) => {
    e.stopPropagation();
    resetFile();
  });
  processBtn.disabled = false;
  hideStatus();
}

function resetFile() {
  selectedFile = null;
  fileInput.value = '';
  dropZone.classList.remove('has-file');
  dropZone.innerHTML = `
    <div class="drop-icon">📄</div>
    <div class="drop-text">Перетащите PDF сюда</div>
    <div class="drop-hint">или нажмите для выбора · до 50 МБ</div>
  `;
  processBtn.disabled = true;
  hideStatus();
}

processBtn.addEventListener('click', processFile);

async function processFile() {
  if (!selectedFile) return;

  processBtn.disabled = true;
  showStatus('processing', `<span class="spinner"></span>Защищаю документ…`);

  const formData = new FormData();
  formData.append('file', selectedFile);
  if (currentMode === 'encrypted_pdf' || currentMode === 'flat_pdf') {
    if (passwordInput.value) formData.append('password', passwordInput.value);
    if (watermarkInput.value) formData.append('watermark', watermarkInput.value);
  }

  const endpoint = currentMode === 'encrypted_pdf'
    ? '/api/protect-pdf-upload'
    : currentMode === 'flat_pdf'
    ? '/api/flatten-pdf'
    : '/api/protect-html';

  try {
    const response = await fetch(endpoint, {
      method: 'POST',
      body: formData,
    });

    if (!response.ok) {
      const err = await response.json().catch(() => ({ error: `HTTP ${response.status}` }));
      throw new Error(err.error || `HTTP ${response.status}`);
    }

    const data = await response.json();

    if (currentMode === 'encrypted_pdf' || currentMode === 'flat_pdf') {
      // base64 → blob → download
      const binary = atob(data.pdf);
      const bytes = new Uint8Array(binary.length);
      for (let i = 0; i < binary.length; i++) bytes[i] = binary.charCodeAt(i);
      const blob = new Blob([bytes], { type: 'application/pdf' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = data.filename || 'protected.pdf';
      a.click();
      URL.revokeObjectURL(url);

      if (currentMode === 'flat_pdf') {
        showStatus('success', `✅ Готово! PDF растеризован.<br>🖼 Текст стал картинкой — нельзя скопировать или выделить<br>🔒 ${data.password ? 'Пароль: <code>' + data.password + '</code>' : 'Без пароля'}`);
      } else {
        showStatus('success', `✅ Готово! PDF зашифрован и скачан.<br>📥 Пароль: <code>${data.password || passwordInput.value || 'axioma2026'}</code><br>📋 <small>Передайте пароль сотруднику через SMS или лично</small>`);
      }
    } else {
      // HTML viewer
      const blob = new Blob([data.html], { type: 'text/html' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = data.filename || 'viewer.html';
      a.click();
      URL.revokeObjectURL(url);

      showStatus('success', '✅ Готово! HTML-просмотрщик скачан.<br>🔒 В браузере нельзя копировать или печатать');
    }

    resetFile();
  } catch (error) {
    showStatus('error', `❌ Ошибка: ${escapeHtml(error.message)}`);
    processBtn.disabled = false;
  }
}

function showStatus(type, html) {
  statusEl.className = `status show ${type}`;
  statusEl.innerHTML = html;
}
function hideStatus() {
  statusEl.className = 'status';
  statusEl.innerHTML = '';
}
function escapeHtml(s) {
  return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'})[c]);
}
function formatSize(bytes) {
  if (bytes < 1024) return bytes + ' Б';
  if (bytes < 1024*1024) return (bytes/1024).toFixed(1) + ' КБ';
  return (bytes/1024/1024).toFixed(2) + ' МБ';
}
</script>
</body>
</html>
